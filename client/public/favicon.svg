<svg xmlns="http://www.w3.org/2000/svg" viewBox="172 135 252 252">
  <!--
    Adaptive favicon: transparent ground, just the serif "L" mark. The fill swaps on the OS color
    scheme so the glyph stays legible on both light and dark browser chrome (a single fixed color
    would wash out against one of them). The browser renders this SVG live, so the media query works
    here even though the rasterized PWA icons (livre-mark.svg) can't carry it. Gold tones track the
    roman accent token in each mode.
  -->
  <style>
    path { fill: #B07D2B; }
    @media (prefers-color-scheme: dark) { path { fill: #E3C77D; } }
  </style>
  <path d="M256 150 L312 150 L270 372 L214 372 Z"/>
  <path d="M204 340 L374 340 L374 372 L204 372 Z"/>
  <path d="M248 150 L322 150 L322 167 L248 167 Z"/>
  <path d="M360 330 L392 330 L392 372 L360 372 Z"/>
</svg>
